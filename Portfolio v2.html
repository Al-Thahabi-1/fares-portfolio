<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fares Awarik — Laravel Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg: #08080a;
  --bg-card: #111114;
  --bg-elevated: #19191d;
  --border: #222228;
  --text: #eae8e3;
  --text-secondary: #8a8880;
  --accent: oklch(0.75 0.15 70);
  --accent-glow: oklch(0.75 0.15 70 / 0.15);
  --accent-dim: oklch(0.55 0.10 70);
  --mono: 'JetBrains Mono', monospace;
  --heading: 'DM Sans', sans-serif;
  --body: 'IBM Plex Sans', sans-serif;
}
html{scroll-behavior:smooth;background:var(--bg);color:var(--text);font-family:var(--body);font-weight:400;line-height:1.65;font-size:16px}
body{overflow-x:hidden;background:var(--bg)}
a{color:inherit;text-decoration:none}
::selection{background:oklch(0.75 0.15 70 / 0.3);color:#fff}

.container{max-width:1120px;margin:0 auto;padding:0 24px}
.section-label{font-family:var(--mono);font-size:13px;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-label::before{content:'//';opacity:0.5}
.section-title{font-family:var(--heading);font-size:clamp(28px,4vw,40px);font-weight:700;line-height:1.2;margin-bottom:16px;color:var(--text)}
section{padding:100px 0;position:relative}
@media(max-width:768px){section{padding:64px 0}}

/* Animated grid bg */
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(234,232,227,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(234,232,227,0.02) 1px, transparent 1px);
  background-size:60px 60px;
}
.grid-bg::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 0%, oklch(0.75 0.15 70 / 0.06), transparent);
}

/* Noise overlay */
.noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* Keyframes */
@keyframes float{0%,100%{transform:translateY(0) rotateX(0) rotateY(0)}50%{transform:translateY(-20px) rotateX(5deg) rotateY(5deg)}}
@keyframes spin-slow{from{transform:rotateY(0) rotateX(15deg)}to{transform:rotateY(360deg) rotateX(15deg)}}
@keyframes pulse-glow{0%,100%{opacity:0.3}50%{opacity:0.7}}
@keyframes slide-up{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes text-reveal{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0% 0 0)}}
@keyframes dash{to{stroke-dashoffset:0}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes orbit{from{transform:rotate(0deg) translateX(var(--r)) rotate(0deg)}to{transform:rotate(360deg) translateX(var(--r)) rotate(-360deg)}}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="noise"></div>
<div id="root" style="position:relative;z-index:2"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>

<script>
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentHue": 49,
  "showParticles": true,
  "lang": "tr"
}/*EDITMODE-END*/;
</script>

<script type="text/babel" src="app.jsx"></script>


</body>
</html>
